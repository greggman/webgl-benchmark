name: build-test-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # macOS runners have a real GPU, which the smoke test needs — it runs on the
    # host GPU, not SwiftShader (deprecated in Chrome, and too slow per frame for the
    # drain-between-frames runner). Don't switch to a GPU-less runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Build
        env:
          NODE_ENV: production
        run: npm run build
      - name: Smoke test (Puppeteer)
        run: npm test
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
